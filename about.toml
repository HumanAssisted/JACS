# cargo-about configuration for JACS
# Generates THIRD-PARTY-NOTICES from dependency licenses

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",
    "MIT-0",
    "0BSD",
    "Unicode-3.0",
    "MPL-2.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

ignore-build-dependencies = true
ignore-dev-dependencies = true

# Workspace members are not third-party
private = { ignore = true }
