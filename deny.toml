# cargo-deny configuration for JACS
# Run: cargo deny check
# CI: cargo deny check licenses

[graph]
all-features = false

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",
    "MIT-0",
    "0BSD",
    "Unicode-3.0",
    "MPL-2.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

# In cargo-deny v0.19+, any license not in `allow` is denied by default.
# The allow-list above is sufficient to block GPL/AGPL/LGPL/SSPL/EUPL.

# Workspace crates without explicit license field use the workspace license
[[licenses.clarify]]
name = "jacsnpm"
expression = "Apache-2.0 OR MIT"
license-files = []

[[licenses.clarify]]
name = "jacspy"
expression = "Apache-2.0 OR MIT"
license-files = []

[[licenses.clarify]]
name = "jacsgo"
expression = "Apache-2.0 OR MIT"
license-files = []

# ring contains legacy OpenSSL-licensed code alongside ISC/Apache-2.0
[[licenses.clarify]]
name = "ring"
expression = "(Apache-2.0 OR ISC) AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# SurrealDB uses BUSL-1.1; accepted for optional backend integration
[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-protocol"

# SurrealDB crates without explicit license field in their published Cargo.toml
[[licenses.clarify]]
name = "surrealdb"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
name = "surrealdb-core"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
name = "surrealdb-types"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
name = "surrealdb-types-derive"
expression = "BUSL-1.1"
license-files = []

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-core"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-types"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-types-derive"

[licenses.private]
ignore = true

[advisories]
# Use the RustSec advisory database
db-urls = ["https://github.com/rustsec/advisory-db"]
