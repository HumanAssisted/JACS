name: Release crates.io

on:
  push:
    tags:
      - 'crate/v*'

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/crate/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Check Cargo.toml version matches tag (jacs + binding-core + jacs-mcp + jacs-cli)
        run: |
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          for dir in jacs binding-core jacs-mcp jacs-cli; do
            CARGO_VERSION=$(grep '^version = ' $dir/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "$dir Cargo version: $CARGO_VERSION, tag: $TAG_VERSION"
            if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Version mismatch! $dir/Cargo.toml has $CARGO_VERSION but tag is $TAG_VERSION"
              exit 1
            fi
          done
          echo "Version match confirmed for jacs, binding-core, jacs-mcp, and jacs-cli"

  publish:
    needs: verify-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.verify-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Publish jacs to crates.io
        run: |
          LATEST=$(curl -sL --retry 3 --retry-delay 5 -H 'User-Agent: jacs-ci (https://github.com/HumanAssisted/JACS)' https://crates.io/api/v1/crates/jacs | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null || echo "")
          if [ "$LATEST" = "$VERSION" ]; then
            echo "jacs $VERSION already published, skipping"
          else
            cd jacs && cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 101 ]; then
                echo "::warning::jacs $VERSION already exists on crates.io (exit 101), continuing"
              else
                exit $EXIT_CODE
              fi
            }
          fi

      - name: Wait for jacs to appear on crates.io
        run: |
          echo "Waiting for jacs $VERSION on crates.io..."
          for i in $(seq 1 60); do
            LATEST=$(curl -sL --retry 3 --retry-delay 5 -H 'User-Agent: jacs-ci (https://github.com/HumanAssisted/JACS)' https://crates.io/api/v1/crates/jacs | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null || echo "")
            if [ "$LATEST" = "$VERSION" ]; then
              echo "jacs $VERSION is available on crates.io"
              exit 0
            fi
            echo "  attempt $i/60 — got '$LATEST', waiting 15s..."
            sleep 15
          done
          echo "::error::Timed out waiting for jacs $VERSION on crates.io"
          exit 1

      - name: Publish jacs-binding-core to crates.io
        run: |
          LATEST=$(curl -sL --retry 3 --retry-delay 5 -H 'User-Agent: jacs-ci (https://github.com/HumanAssisted/JACS)' https://crates.io/api/v1/crates/jacs-binding-core | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null || echo "")
          if [ "$LATEST" = "$VERSION" ]; then
            echo "jacs-binding-core $VERSION already published, skipping"
          else
            cd binding-core && cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 101 ]; then
                echo "::warning::jacs-binding-core $VERSION already exists on crates.io (exit 101), continuing"
              else
                exit $EXIT_CODE
              fi
            }
          fi

      - name: Wait for jacs-binding-core to appear on crates.io
        run: |
          echo "Waiting for jacs-binding-core $VERSION on crates.io..."
          for i in $(seq 1 60); do
            LATEST=$(curl -sL --retry 3 --retry-delay 5 -H 'User-Agent: jacs-ci (https://github.com/HumanAssisted/JACS)' https://crates.io/api/v1/crates/jacs-binding-core | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null || echo "")
            if [ "$LATEST" = "$VERSION" ]; then
              echo "jacs-binding-core $VERSION is available on crates.io"
              exit 0
            fi
            echo "  attempt $i/60 — got '$LATEST', waiting 15s..."
            sleep 15
          done
          echo "::error::Timed out waiting for jacs-binding-core $VERSION on crates.io"
          exit 1

      - name: Publish jacs-mcp to crates.io
        run: |
          LATEST=$(curl -sL --retry 3 --retry-delay 5 -H 'User-Agent: jacs-ci (https://github.com/HumanAssisted/JACS)' https://crates.io/api/v1/crates/jacs-mcp | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null || echo "")
          if [ "$LATEST" = "$VERSION" ]; then
            echo "jacs-mcp $VERSION already published, skipping"
          else
            cd jacs-mcp && cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 101 ]; then
                echo "::warning::jacs-mcp $VERSION already exists on crates.io (exit 101), continuing"
              else
                exit $EXIT_CODE
              fi
            }
          fi

      - name: Wait for jacs-mcp to appear on crates.io
        run: |
          echo "Waiting for jacs-mcp $VERSION on crates.io..."
          for i in $(seq 1 60); do
            LATEST=$(curl -sL --retry 3 --retry-delay 5 -H 'User-Agent: jacs-ci (https://github.com/HumanAssisted/JACS)' https://crates.io/api/v1/crates/jacs-mcp | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null || echo "")
            if [ "$LATEST" = "$VERSION" ]; then
              echo "jacs-mcp $VERSION is available on crates.io"
              exit 0
            fi
            echo "  attempt $i/60 — got '$LATEST', waiting 15s..."
            sleep 15
          done
          echo "::error::Timed out waiting for jacs-mcp $VERSION on crates.io"
          exit 1

      - name: Publish jacs-cli to crates.io
        run: |
          LATEST=$(curl -sL --retry 3 --retry-delay 5 -H 'User-Agent: jacs-ci (https://github.com/HumanAssisted/JACS)' https://crates.io/api/v1/crates/jacs-cli | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null || echo "")
          if [ "$LATEST" = "$VERSION" ]; then
            echo "jacs-cli $VERSION already published, skipping"
          else
            cd jacs-cli && cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 101 ]; then
                echo "::warning::jacs-cli $VERSION already exists on crates.io (exit 101), continuing"
              else
                exit $EXIT_CODE
              fi
            }
          fi
