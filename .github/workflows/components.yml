name: Workspace Components (jacs-mcp, jacsgo)

on:
  push:
    branches: ["main"]
    paths:
      - "jacs-mcp/**"
      - "jacsgo/**"
      - "jacs/**"
      - "binding-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/components.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "jacs-mcp/**"
      - "jacsgo/**"
      - "jacs/**"
      - "binding-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/components.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-jacs-mcp:
    name: Test jacs-mcp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Build jacs-cli (required by jacs-mcp integration tests)
        run: cargo build -p jacs-cli

      - name: Run jacs-mcp tests (core profile)
        run: cargo test -p jacs-mcp --verbose

      - name: Run jacs-mcp tests (full profile)
        run: cargo test -p jacs-mcp --features full-tools --verbose

  test-jacsgo:
    name: Test jacsgo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run jacsgo tests
        working-directory: jacsgo
        run: GOCACHE=/tmp/jacs-go-cache make test

      - name: Build jacsgo examples
        working-directory: jacsgo
        run: GOCACHE=/tmp/jacs-go-cache make examples
