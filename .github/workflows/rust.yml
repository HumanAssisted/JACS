name: Rust (jacs crate)

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "jacs/**"
      - "jacs-cli/**"
      - "jacs-mcp/**"
      - "binding-core/**"
      - "jacs-postgresql/**"
      - "jacs-surrealdb/**"
      - "jacs-duckdb/**"
      - "jacs-redb/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "jacs/**"
      - "jacs-cli/**"
      - "jacs-mcp/**"
      - "binding-core/**"
      - "jacs-postgresql/**"
      - "jacs-surrealdb/**"
      - "jacs-duckdb/**"
      - "jacs-redb/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
  workflow_dispatch:
    inputs:
      run_full:
        description: "Run full release-level Rust test matrix"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 9 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  quick-jacs:
    name: Quick jacs checks (ubuntu)
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full != 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit and run audit
        run: |
          cargo install cargo-audit --locked --version 0.22.1
          cargo audit --ignore RUSTSEC-2023-0071

      - name: License check (cargo-deny)
        run: |
          cargo install cargo-deny --locked
          cargo deny check licenses

      - name: Validate schema $id fields match file paths
        run: ./scripts/validate-schemas.sh

      - name: Run quick Rust test suite (core)
        run: |
          cargo test -p jacs --verbose --lib
          cargo test -p jacs --verbose --test pq2025_tests
          cargo test -p jacs --verbose --test cross_language_tests
          cargo test -p jacs --verbose --test structured_logging_tests
          cargo test -p jacs-binding-core --verbose
          cargo build -p jacs-cli
          cargo test -p jacs-mcp --verbose

      - name: Run jacs-mcp tests (without attestation)
        run: cargo test -p jacs-mcp --no-default-features --features mcp --verbose

      - name: Run feature-gated tests (agreements, a2a, attestation)
        run: cargo test -p jacs --features agreements,a2a,attestation --verbose

      - name: Run in-process backend crate tests (DuckDB, Redb, SurrealDB)
        run: |
          cargo test -p jacs-duckdb --verbose
          cargo test -p jacs-redb --verbose
          cargo test -p jacs-surrealdb --verbose

  # PostgreSQL backend tests use testcontainers (requires Docker daemon)
  backend-postgresql:
    name: jacs-postgresql (testcontainers)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run jacs-postgresql tests
        run: cargo test -p jacs-postgresql --verbose

  full-jacs-release:
    name: Full jacs suite (${{ matrix.os }})
    needs: [backend-postgresql]
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full == 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit and run audit (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-audit --locked --version 0.22.1
          cargo audit --ignore RUSTSEC-2023-0071

      - name: Run full jacs tests
        run: |
          cargo test -p jacs --verbose
          cargo test -p jacs-binding-core --verbose
          cargo build -p jacs-cli
          cargo test -p jacs-mcp --verbose
          cargo test -p jacs-cli --verbose

      - name: Run jacs-mcp tests (without attestation)
        run: cargo test -p jacs-mcp --no-default-features --features mcp --verbose

      - name: Run feature-gated tests (agreements, a2a, attestation)
        run: cargo test -p jacs --features agreements,a2a,attestation --verbose

      - name: Run in-process backend crate tests (release)
        run: |
          cargo test -p jacs-duckdb --verbose
          cargo test -p jacs-redb --verbose
          cargo test -p jacs-surrealdb --verbose

      - name: Run jacs-postgresql tests (Linux only)
        if: runner.os == 'Linux'
        run: cargo test -p jacs-postgresql --verbose

  full-jacs-nightly:
    name: Full jacs suite (nightly ubuntu)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit and run audit
        run: |
          cargo install cargo-audit --locked --version 0.22.1
          cargo audit --ignore RUSTSEC-2023-0071

      - name: Run nightly full Rust tests
        run: |
          cargo test -p jacs --verbose
          cargo test -p jacs-binding-core --verbose
          cargo build -p jacs-cli
          cargo test -p jacs-mcp --verbose
          cargo test -p jacs-cli --verbose

      - name: Run jacs-mcp tests (without attestation)
        run: cargo test -p jacs-mcp --no-default-features --features mcp --verbose

      - name: Run feature-gated tests (agreements, a2a, attestation)
        run: cargo test -p jacs --features agreements,a2a,attestation --verbose

      - name: Run in-process backend crate tests (nightly)
        run: |
          cargo test -p jacs-duckdb --verbose
          cargo test -p jacs-redb --verbose
          cargo test -p jacs-surrealdb --verbose

      - name: Run jacs-postgresql tests
        run: cargo test -p jacs-postgresql --verbose
