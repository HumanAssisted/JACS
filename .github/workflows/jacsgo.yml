name: Go Bindings (jacsgo)

on:
  push:
    branches: ["main"]
    paths:
      - "jacsgo/**"
      - "jacs/**"
      - "binding-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/jacsgo.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "jacsgo/**"
      - "jacs/**"
      - "binding-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/jacsgo.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-jacsgo:
    name: Test jacsgo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run jacsgo tests
        working-directory: jacsgo
        run: GOCACHE=/tmp/jacs-go-cache make test

      - name: Build jacsgo examples
        working-directory: jacsgo
        run: GOCACHE=/tmp/jacs-go-cache make examples
